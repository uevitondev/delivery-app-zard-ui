<div
  *ngIf="showBanner()"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 ease-in-out"
  [class.translate-y-0]="showBanner()"
  [class.-translate-y-full]="!showBanner()"
>
  <div
    class="mx-4 mt-4 px-4 py-3 rounded-lg shadow-lg flex items-center justify-between"
    [class.bg-red-500]="!isOnline()"
    [class.bg-green-500]="isOnline()"
  >
    <div class="flex items-center gap-3">
      <!-- Ícone de WiFi -->
      <svg
        *ngIf="isOnline()"
        class="w-5 h-5 text-white"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"
        />
      </svg>

      <!-- Ícone de Offline -->
      <svg
        *ngIf="!isOnline()"
        class="w-5 h-5 text-white"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"
        />
      </svg>

      <span class="text-white font-medium text-sm">
        <span *ngIf="isOnline()">Conexão restaurada</span>
        <span *ngIf="!isOnline()">Sem conexão com a internet</span>
      </span>
    </div>

    <button
      *ngIf="!isOnline()"
      (click)="retryConnection()"
      class="bg-white text-red-500 px-3 py-1 rounded-md text-sm font-semibold hover:bg-red-50 transition-colors"
    >
      Tentar novamente
    </button>
  </div>
</div>
