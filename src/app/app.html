<app-connectivity-banner />
<router-outlet />
<button
  z-button
  zType="secondary"
  zSize="icon"
  class="theme-toggle"
  (click)="darkMode.toggleTheme()"
  [attr.aria-label]="themeLabel()"
  [title]="themeLabel()"
>
  @if (darkMode.resolvedTheme() === 'dark') {
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2.5M12 19.5V22M4.93 4.93l1.77 1.77M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07l1.77-1.77M17.3 6.7l1.77-1.77"></path>
    </svg>
  } @else {
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path>
    </svg>
  }
  <span class="sr-only">{{ themeLabel() }}</span>
</button>
<span class="theme-status" aria-live="polite">Modo atual: {{ darkMode.mode() }}</span>
<app-dev-badge />
<z-toaster></z-toaster>
