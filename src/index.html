<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Delivery Zardui</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#f97316">
  <meta name="description" content="Seu app de delivery com visual de produto nativo">
  <meta name="keywords" content="delivery, comida, restaurante, pedido online">
  <meta name="author" content="Delivery Zardui">

  <!-- Apple Mobile Web App -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Delivery">

  <!-- iOS Splash Screen -->
  <link rel="apple-touch-startup-image" href="favicon.ico">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Script de tema: executa antes do render para evitar FOUC -->
  <script>
    (function() {
      try {
        var storageKey = 'zard-theme';
        var stored = localStorage.getItem(storageKey);
        var theme = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = theme === 'dark' || (theme === 'system' && prefersDark);

        var root = document.documentElement;
        root.classList.add('preload');
        root.classList.toggle('dark', isDark);
        root.style.colorScheme = isDark ? 'dark' : 'light';
        root.dataset.theme = theme;

        // Remove classe preload após carregamento para ativar transições
        requestAnimationFrame(function() {
          root.classList.remove('preload');
        });
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
