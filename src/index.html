<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Delivery Zardui</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#f97316">
  <meta name="description" content="Seu app de delivery com visual de produto nativo">
  <meta name="keywords" content="delivery, comida, restaurante, pedido online">
  <meta name="author" content="Delivery Zardui">
  
  <!-- Apple Mobile Web App -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Delivery">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- iOS Splash Screen -->
  <link rel="apple-touch-startup-image" href="favicon.ico">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.webmanifest">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (() => {
      const storageKey = 'zard-theme';
      const root = document.documentElement;
      const storedTheme = localStorage.getItem(storageKey) || 'system';
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const resolvedTheme = storedTheme === 'system' ? (prefersDark ? 'dark' : 'light') : storedTheme;

      root.classList.toggle('dark', resolvedTheme === 'dark');
      root.style.colorScheme = resolvedTheme;
      root.dataset.theme = storedTheme;
    })();
  </script>

    <script>
      (function () {
        const html = document.documentElement;

        try {
          const theme = localStorage.theme;
          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? false;

          const isSystem = theme === 'system' || !('theme' in localStorage);
          const isDark = theme === 'dark' || (isSystem && prefersDark);
          html.classList.add('scheme-light-dark');
          html.classList.toggle('dark', isDark);
          html.setAttribute('data-theme', theme ?? 'system');
        } catch (_) {}
      })();
    </script>

  </head>
<body>
  <app-root></app-root>
</body>
</html>
